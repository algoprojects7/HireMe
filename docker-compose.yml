version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: labourlink-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: labourlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: labourlink-api
    environment:
      DATABASE_URL: postgresql://admin:password@db:5432/labourlink?schema=public
      JWT_SECRET: your_jwt_secret_key
    ports:
      - "3000:3000"
    depends_on:
      - db

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: labourlink-admin
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  postgres_data:
